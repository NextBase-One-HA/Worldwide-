        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* THE TRIGGER: $25 LATEST BUILD */
        .hero-gate {
            background: #fff;
            color: #000;
            text-align: center;
            padding: 80px 20px;
            border-bottom: 8px solid var(--neon-gold);
            box-shadow: 0 20px 50px var(--gold-glow);
        }
        .title-large { font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 0.9; margin-bottom: 15px; }
        .sub-lead { font-size: 1.2rem; font-weight: 700; margin-bottom: 40px; color: #222; text-transform: uppercase; letter-spacing: 1px; }
        .cta-action {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 0px; /* SHARP EDGE FOR PROFESSIONAL LOOK */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }
        .cta-action:active { transform: translateY(4px); box-shadow: none; }

        /* THE BLACKBOX: SMILE / FRIEND */
        .void-core { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
        .identity-frame { border: 1px solid #222; padding: 50px; text-align: center; background: #050505; }
        .neon-brand { color: var(--neon-gold); text-shadow: 0 0 25px var(--neon-gold); font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; letter-spacing: 4px; }
        .secure-status { color: #333; font-size: 0.7rem; letter-spacing: 5px; font-weight: bold; }

        /* GLOBAL FOOTER (NO JAPANESE) */
        .system-base { background: #000; padding: 40px 20px; text-align: center; border-top: 1px solid #111; }
        .reviewer-info { color: #444; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }
        .ui-token { border: 1px solid #333; padding: 2px 10px; color: #666; font-size: 0.7rem; }
        .legal-row a { color: #333; text-decoration: none; margin: 0 15px; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="hero-gate">
        <div class="title-large">GLB WEB EDITION<br>LIFETIME ACCESS</div>
        <div class="sub-lead">Verified Intelligence. One-time Payment.</div>
        <a href="https://buy.stripe.com/14A9AV8Vn8KA97xbenasg0l" class="cta-action">UNLOCK NOW ($25)</a>
        <div style="font-size: 0.7rem; color: #aaa; margin-top: 25px; font-weight: bold;">POWERED BY GEMINI 2.5 FLASH</div>

    <div class="void-core">

            <div class="neon-brand">SMILE / FRIEND</div>

    </div>

    <div class="system-base">
        <div class="reviewer-info">
            REVIEWER ONLY: TAP <span class="ui-token">DONE</span> TO RETURN

        <div class="legal-row">

</body>
