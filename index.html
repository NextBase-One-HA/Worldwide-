<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextBase :: GLB</title>
    <style>
        :root { --neon-gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.8); }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* 頂点：25ドルの実弾（白背景で視線を強制） */
        .primary-target {
            background: #fff;
            color: #000;
            text-align: center;
            padding: 50px 20px;
            border-bottom: 5px solid var(--neon-gold);
            box-shadow: 0 10px 30px var(--gold-glow);
        }
        .main-title { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        .sub-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; color: #333; }
        .buy-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 20px 40px;
            font-size: 1.8rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .buy-btn:active { transform: scale(0.98); }

        /* 中央：暗闇の核心（完全秘匿） */
        .core-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
        .glow-frame { border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; background: rgba(10,10,10,0.5); }
        .neon-txt { color: var(--neon-gold); text-shadow: 0 0 15px var(--neon-gold); font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }

        /* 底部：審査用＆リーガル */
        .bottom-shelf { background: #080808; border-top: 1px solid #222; padding: 30px 20px; text-align: center; }
        .reviewer-info { color: #888; font-size: 0.8rem; margin-bottom: 20px; line-height: 1.6; }
        .done-label { border: 1px solid var(--neon-gold); padding: 2px 8px; border-radius: 4px; color: var(--neon-gold); }
        .nav-links a { color: #555; text-decoration: none; margin: 0 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="primary-target">
        <div class="main-title">GLB WEB EDITION:<br>LIFETIME ACCESS</div>
        <div class="sub-text">ヤフオク実績785件の男が贈る、<br>1名限定の永久ライセンス。</div>
        <a href="https://buy.stripe.com/14A9AV8Vn8KA97xbenasg0l" class="buy-btn">GET ACCESS NOW ($25)</a>
        <div style="font-size: 0.8rem; color: #888; margin-top: 15px;">※一回払い・Gemini 2.5 150%モード搭載</div>
    </div>

    <div class="core-box">
        <div class="glow-frame">
            <div class="neon-txt">SMILE / FRIEND</div>
            <div style="color: #444; font-size: 0.9rem; letter-spacing: 2px;">AUTHENTICATED & LOCKED.</div>
        </div>
    </div>

    <div class="bottom-shelf">
        <div class="reviewer-info">
            App Store Reviewer: Tap <span class="done-label">Done</span> or <span class="done-label">×</span> at the top left to return.<br>
            ( アプリに戻るには、左上の「完了」を押してください )
        </div>
        <div class="nav-links">
            <a href="terms.html">Terms</a> | <a href="privacy.html">Privacy</a> | <a href="legal.html">Legal</a> | <a href="support.html">Support</a>
        </div>
    </div>

</body>
</html>
