<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXT BASE | GLB</title>
<style>
:root{ --gold:#d6b25e; --bg:#050505; --text:#f2f2f2; }
body{ margin:0; background:var(--bg); color:var(--text); font-family:serif; overflow-x:hidden; }

/* 動画イントロ */
#intro{ position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; }
#intro video{ max-width:100%; max-height:100%; object-fit:contain; }

/* メイン */
#main{ opacity:0; transition:opacity 1.5s; padding:40px 20px; text-align:center; display:none; }
#main.show{ opacity:1; display:block; }

.glb-logo{ width:min(70vw, 350px); margin:60px auto; display:block; }
.hero-text{ font-size:1.5rem; letter-spacing:0.2em; margin-bottom:40px; color:var(--gold); }

/* アプリ起動ボタン（唯一の出口） */
.launch-btn{ 
    display:inline-block; padding:20px 60px; background:none; color:var(--gold); 
    border:2px solid var(--gold); font-size:1.3rem; font-weight:bold; 
    text-decoration:none; border-radius:50px; transition:0.3s;
}
.launch-btn:hover{ background:var(--gold); color:#000; }

.master-card{ width:100%; max-width:380px; margin:100px auto 20px; border:1px solid #333; display:block; }
</style>
</head>
<body>

<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="door.mp4" type="video/mp4">
  </video>
</div>

<div id="main">
  <img src="glb-logo.png" class="glb-logo" alt="GLB">
  
  <div class="hero-text">GLOBAL LANGUAGE BREAKER</div>
  
  <p style="color:#888; margin-bottom:40px;">150万のロジックが、今動き出す。</p>

  <a href="apps/glb/index.html" class="launch-btn">LAUNCH APP</a>

  <img src="master-card.png" class="master-card" alt="NextBase Master Card">
  <p style="color:#666; font-style:italic;">"For you, I will never give up."</p>
</div>

<script>
const video = document.getElementById('introVideo');
const intro = document.getElementById('intro');
const main = document.getElementById('main');

function enterSite() {
  intro.style.opacity = '0';
  setTimeout(() => {
    intro.style.display = 'none';
    main.classList.add('show');
  }, 1000);
}

video.onended = enterSite;
// 保険（8秒で強制切り替え）
setTimeout(enterSite, 8000);
</script>

</body>
</html>
