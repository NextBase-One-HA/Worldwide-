<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NextBase | NE-Audit Engineering</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; text-align:center; }
        .hero { padding:80px 20px; }
        .logo { font-size:3.5rem; font-weight:900; letter-spacing:15px; color:#ffcc00; }
        .engine { max-width:800px; margin:0 auto; padding:30px; background:#050505; border:1px solid #1a1a1a; }
        textarea { width:100%; height:180px; background:#111; border:1px solid #333; color:#fff; padding:15px; box-sizing:border-box; }
        .exec-btn { width:100%; padding:20px; background:#ffcc00; color:#000; border:none; font-weight:bold; cursor:pointer; margin-top:10px; letter-spacing:2px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:10px; max-width:1000px; margin:50px auto; padding:20px; }
        .btn { border:1px solid #222; padding:15px; text-decoration:none; color:#666; font-size:0.75rem; transition:0.3s; }
        .btn:hover { border-color:#ffcc00; color:#ffcc00; }
        .gold { border-color:#ffcc00; color:#ffcc00; font-weight:bold; }
        .footer { padding:100px; color:#111; letter-spacing:20px; border-top:1px solid #111; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="logo">NEXTBASE</div>
        <div style="color:#444; letter-spacing:5px; margin-top:10px;">NE-AUDIT PROTOCOL v1.0</div>
    </section>

    <div class="engine">
        <input type="password" id="key" placeholder="ENTER YOUR API KEY" style="width:100%; padding:10px; background:#111; border:1px solid #333; color:#fff; margin-bottom:10px;">
        <textarea id="input" placeholder="INPUT TEXT FOR AUDITED TRANSFORMATION..."></textarea>
        <button class="exec-btn" onclick="run()">EXECUTE ENGINE</button>
        <div id="out" style="margin-top:20px; text-align:left; white-space:pre-wrap;"></div>
        <div id="sig" style="margin-top:10px; font-size:0.6rem; color:#333; font-family:monospace; text-align:left;"></div>
    </div>

    <div class="grid">
        <a href="https://buy.stripe.com/dRm3cx7Rj8KA0B1gyHasg01" class="btn">SUBSCRIPTION $1.99/mo</a>
        <a href="https://buy.stripe.com/fZuaEZ0oRgd25Vl96fasg00" class="btn">SUBSCRIPTION $4.99/mo</a>
        <a href="https://buy.stripe.com/14A9AV8Vn8KA97xbenasg0l" class="btn gold">LIFETIME ACCESS $25</a>
        <a href="https://buy.stripe.com/4gM14p1sVd0Q6Zp4PZasg0c" class="btn gold">TOMORI ENGINE $440</a>
    </div>

    <div class="footer">SMILE / FRIEND</div>

    <script>
        async function run() {
            const k = document.getElementById('key').value;
            const i = document.getElementById('input').value;
            const o = document.getElementById('out');
            if(!k) return alert("API KEY REQUIRED");
            o.innerText = "PROCESSING...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "NextBase Mode. 意味変更・数字URL変化禁止。クリーンに翻訳・整形せよ:\n" + i }] }] })
                });
                const d = await res.json();
                const r = d.candidates[0].content.parts[0].text;
                o.innerText = r;
                document.getElementById('sig').innerText = "AUDIT_CHAIN_SIG: " + btoa(Date.now() + r.length).slice(0,32) + "... [VERIFIED]";
            } catch(e) { o.innerText = "SYSTEM ERROR."; }
        }
    </script>
</body>
</html>
